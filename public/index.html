<!DOCTYPE html>
<html>
<head>
  <title>DP Chat Optimizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>💬 AI Chat (DP Optimized)</h1>

  <div id="chat"></div>

  <div class="input-box">

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
